<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>God Mode — Planet Destroyer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div class="hud-col">
      <div class="stat">
        <span class="label">POPULATION</span>
        <span id="pop" class="value green">8,000,000,000</span>
      </div>
      <div class="stat">
        <span class="label">DESTRUCTION</span>
        <span id="dest" class="value">0%</span>
      </div>
    </div>
    <div class="hud-center">
      <div id="title">GOD MODE</div>
      <div id="subtitle">Planet Destroyer</div>
    </div>
    <div class="hud-col right">
      <div class="stat">
        <span class="label">POWER</span>
        <span id="power-label" class="value" style="color:#ff8844">METEOR STRIKE</span>
      </div>
      <div class="stat">
        <span class="label">STATUS</span>
        <span id="status-txt" class="value">READY</span>
      </div>
    </div>
  </div>

  <div id="powers">
    <button class="power active" data-power="meteor"    data-label="METEOR STRIKE"  title="Meteor Strike">☄️</button>
    <button class="power"        data-power="laser"     data-label="LASER BEAM"     title="Laser Beam — drag">🔴</button>
    <button class="power"        data-power="nuke"      data-label="NUCLEAR STRIKE" title="Nuclear Strike">☢️</button>
    <button class="power"        data-power="blackhole" data-label="BLACK HOLE"     title="Black Hole">🕳️</button>
    <button class="power"        data-power="flood"     data-label="GLOBAL FLOOD"   title="Raise sea level">🌊</button>
    <button class="power"        data-power="volcano"   data-label="VOLCANO"        title="Volcanic eruption">🌋</button>
    <button class="power"        data-power="ice"       data-label="ICE AGE"        title="Freeze the planet">❄️</button>
    <button class="power restore" data-power="restore"  data-label="RESTORE"        title="Restore planet">♻️</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
