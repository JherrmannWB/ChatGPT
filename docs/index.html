<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AetherDeck — Powerpoint Reimagined</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand__glyph">◆</div>
      <div>
        <div class="brand__title">AetherDeck</div>
        <div class="brand__sub">A cinematic presentation engine for the web</div>
      </div>
    </div>

    <div class="topbar__actions">
      <button id="toggleNotes" class="btn btn--ghost" type="button">Notes</button>
      <button id="toggleAutoplay" class="btn btn--ghost" type="button">Autoplay</button>
      <button id="toggleTheme" class="btn btn--ghost" type="button">Theme</button>
      <button id="toggleFullscreen" class="btn btn--primary" type="button">Present</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="rail" aria-label="Slide thumbnails">
      <div id="thumbRail"></div>
    </aside>

    <section class="stageWrap">
      <div class="stageMeta">
        <div id="slideCounter" class="slideCounter">1 / 1</div>
        <div class="progress"><span id="progressFill"></span></div>
      </div>

      <article id="slideStage" class="slideStage" aria-live="polite"></article>

      <nav class="controls" aria-label="Slide controls">
        <button id="prevSlide" class="btn" type="button">← Previous</button>
        <button id="nextSlide" class="btn btn--primary" type="button">Next →</button>
      </nav>
    </section>

    <aside id="notesPanel" class="notesPanel" hidden>
      <h2>Speaker Notes</h2>
      <p id="speakerNotes"></p>
      <h3>Delivery Cues</h3>
      <ul id="deliveryCues"></ul>
    </aside>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
