<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AetherDeck X — Presentation OS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand__glyph">◇</div>
      <div>
        <div class="brand__title">AetherDeck X</div>
        <div class="brand__sub">Presentation OS · cinematic + interactive + speaker-intelligent</div>
      </div>
    </div>

    <div class="topbar__status" aria-live="polite">
      <span id="statusMode">Audience View</span>
      <span aria-hidden="true">•</span>
      <span id="statusTime">00:00</span>
    </div>

    <div class="topbar__actions">
      <button id="toggleCommand" class="btn btn--ghost" type="button">Jump ⌘K</button>
      <button id="toggleNotes" class="btn btn--ghost" type="button">Notes</button>
      <button id="toggleAutoplay" class="btn btn--ghost" type="button">Autoplay</button>
      <button id="toggleTheme" class="btn btn--ghost" type="button">Theme</button>
      <button id="toggleFullscreen" class="btn btn--primary" type="button">Present</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="rail" aria-label="Slide thumbnails">
      <h2 class="rail__title">Deck Map</h2>
      <div id="thumbRail"></div>
    </aside>

    <section class="stageWrap">
      <div class="stageMeta">
        <div class="stageMeta__row">
          <div id="slideCounter" class="slideCounter">1 / 1</div>
          <div id="fragmentCounter" class="fragmentCounter"></div>
        </div>
        <div class="progress"><span id="progressFill"></span></div>
      </div>

      <article id="slideStage" class="slideStage" aria-live="polite"></article>

      <nav class="controls" aria-label="Slide controls">
        <button id="prevSlide" class="btn" type="button">← Previous</button>
        <button id="nextFragment" class="btn btn--primary" type="button">Next Step →</button>
      </nav>
    </section>

    <aside id="notesPanel" class="notesPanel" hidden>
      <h2>Speaker Notes</h2>
      <p id="speakerNotes"></p>

      <h3>Delivery Cues</h3>
      <ul id="deliveryCues"></ul>

      <h3>Talk Track</h3>
      <div id="talkTrack" class="talkTrack"></div>
    </aside>
  </main>

  <section id="commandPalette" class="palette" hidden aria-label="Jump to slide">
    <div class="palette__shell">
      <input id="slideSearch" type="text" placeholder="Jump to slide by title or number…" autocomplete="off" />
      <div id="searchResults" class="palette__results"></div>
    </div>
  </section>

  <script src="./app.js" defer></script>
</body>
</html>
