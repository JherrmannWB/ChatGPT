<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Superman: Ground to Sky</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <h1>2D SUPERMAN: GROUND TO SKY</h1>
    <div class="stats">
      <span>Health: <strong id="health">180/180</strong></span>
      <span>Level: <strong id="wave">1</strong>/10</span>
      <span>Enemies: <strong id="enemies">0</strong></span>
      <span>Score: <strong id="score">0</strong></span>
      <span>Flight Energy: <strong id="energy">100</strong>%</span>
    </div>
    <p class="controls">
      Move: A/D or ←/→ • Fly Up: W/↑/Space • Punch: F • Kick: G • Pause: P
    </p>
  </div>

  <div id="overlay" class="hidden">
    <div id="overlay-text"></div>
    <button id="restart">Restart Mission</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
